# Deployed by the Ship station to /opt/products/ghost-shift-marketing/repo on the VPS.
# Ship pre-creates the product network and attaches shared-postgres to it,
# writes ../.env (DATABASE_URL, VIRTUAL_HOST, LETSENCRYPT_HOST, VIRTUAL_PORT, GIT_SHA),
# then runs: docker compose -p ghost-shift-marketing up -d --build
name: ghost-shift-marketing
services:
  app:
    build: .
    restart: unless-stopped
    env_file:
      - ../.env
    networks: [default, proxy]
networks:
  default:
    external: true
    name: ghost-shift-marketing_net
  proxy:
    external: true
    name: nginx-proxy
