# Post-deploy smoke test (ST-1/ST-2). The production deploy itself happens
# outside this repo (the operator's Ship station running `docker compose up
# -d --build` against the VPS); that pipeline triggers this workflow via the
# GitHub API immediately after the deploy step completes, to catch a broken
# TLS cert, a localhost-leaking og:image, or a broken image asset before
# anyone shares the link.
name: post-deploy-smoke-test

on:
  workflow_dispatch:
    inputs:
      site_url:
        description: Production site URL to smoke test
        required: false
        default: https://ghost-shift-marketing.spacerockapps.com

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run post-deploy smoke test
        env:
          NEXT_PUBLIC_SITE_URL: ${{ inputs.site_url }}
        run: node scripts/post-deploy-smoke-test.mjs
